<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Noa IA PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Noa" class="logo-img">
                    <div class="status-dot"></div>
                </div>
                <div class="header-text">
                    <h1>Noa IA</h1>
                    <span id="connectionStatus">PRO • Conectado</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="clearChat()">🗑️</button>
                <button class="icon-btn" onclick="toggleConfig()">⚙️</button>
            </div>
        </div>
    </header>

    <main id="chatArea">
        <div class="welcome-screen" id="welcomeScreen">
            <div class="ai-orb"></div>
            <h2>¿Qué tienes en mente?</h2>
            <p>Toca el micro o escribe para empezar.</p>
        </div>
        <div id="typingIndicator" class="typing-indicator msg ai-msg">
            <span></span><span></span><span></span>
        </div>
    </main>

    <footer>
        <div class="input-bar">
            <button class="icon-btn mic-btn" id="micBtn" onclick="audioMode()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <textarea id="textInput" placeholder="Habla conmigo..." rows="1" autocomplete="off"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendText()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        
        <div class="nav-actions">
            <button class="btn-action call" id="callBtn" onclick="startCall()">📞 Iniciar Llamada</button>
            <button class="btn-action stop" id="stopBtn" onclick="stopCall()" style="display: none;">🛑 Finalizar</button>
        </div>
    </footer>

    <div id="configModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Ajustes de Red</h3>
            <input type="url" id="serverInput" placeholder="https://tuserver.ngrok.app">
            <button class="btn-save" onclick="toggleConfig()">Listo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
